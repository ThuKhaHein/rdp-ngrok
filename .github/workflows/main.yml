name: CI
on: [push, workflow_dispatch]

jobs:
  build:

  run-on: windows-latest

  steps:
  - name: Download
    runs: Invoke-WebRequest https://bin.equinox.io/c/bNy1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
  - name: Extract
    run: Expand-Archive ngrok.zip
  - name: Auth
    run: .\ngrok\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
    env:
    NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
    -name: Enable outputs:
      run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' - name "fDenyTSConnections" -Value 0
      -run: Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
      -run: Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WiinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
      -run: Set-LocalUser -Name "runneradmin" -Password (ConvertTo-SecureString -AsPlainText "P@ss0rd!" -Force)
      -name: Create Tunnel
      run: .\ngrok\ngrok.exe tcp 3389
